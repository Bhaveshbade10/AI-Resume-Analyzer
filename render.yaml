# Render Blueprint: one-click deploy for AI Resume Analyzer backend + PostgreSQL
# Repo: https://github.com/Bhaveshbade10/AI-Resume-Analyzer
# Deploy: Render Dashboard → New → Blueprint → connect this repo

databases:
  - name: ai-resume-db
    databaseName: airesume
    plan: free

services:
  - type: web
    runtime: node
    name: ai-resume-backend
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: node src/server.js
    preDeployCommand: npx prisma db push
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ai-resume-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
